<svg xmlns="[w3.org](http://www.w3.org/2000/svg)" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- Quran Book Icon -->
  <g fill="white">
    <!-- Book Cover -->
    <path d="M25 25 Q25 20 30 20 L70 20 Q75 20 75 25 L75 75 Q75 80 70 80 L30 80 Q25 80 25 75 Z" fill="none" stroke="white" stroke-width="3"/>
    
    <!-- Center Line -->
    <line x1="50" y1="25" x2="50" y2="75" stroke="white" stroke-width="2"/>
    
    <!-- Text Lines Left -->
    <line x1="32" y1="35" x2="45" y2="35" stroke="white" stroke-width="2"/>
    <line x1="32" y1="45" x2="45" y2="45" stroke="white" stroke-width="2"/>
    <line x1="32" y1="55" x2="45" y2="55" stroke="white" stroke-width="2"/>
    <line x1="32" y1="65" x2="45" y2="65" stroke="white" stroke-width="2"/>
    
    <!-- Text Lines Right -->
    <line x1="55" y1="35" x2="68" y2="35" stroke="white" stroke-width="2"/>
    <line x1="55" y1="45" x2="68" y2="45" stroke="white" stroke-width="2"/>
    <line x1="55" y1="55" x2="68" y2="55" stroke="white" stroke-width="2"/>
    <line x1="55" y1="65" x2="68" y2="65" stroke="white" stroke-width="2"/>
    
    <!-- Radio Waves -->
    <path d="M78 50 Q85 45 85 50 Q85 55 78 50" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
    <path d="M82 50 Q92 42 92 50 Q92 58 82 50" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
